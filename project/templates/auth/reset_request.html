{% extends "base.html" %}

{% block content %}
<div class="content-section">
    <form method="POST" action="">
        <fieldset class="form-group">
            <legend class="border-bottom mb-4">Passwort zurücksetzen</legend>
            <div class="form-group">
                <label>E-Mail Adresse</label>
                <input type="email" name="email" class="form-control" required>
            </div>
        </fieldset>
        <div class="form-group">
            <button type="submit" class="btn btn-outline-info">Link anfordern</button>
        </div>
    </form>
</div>
{% endblock content %}
