{% extends "base.html" %}

{% block content %}
<div class="content-section">
    <form method="POST" action="">
        <fieldset class="form-group">
            <legend class="border-bottom mb-4">Neues Passwort vergeben</legend>
            <div class="form-group">
                <label>Neues Passwort</label>
                <input type="password" name="password" class="form-control" required>
            </div>
        </fieldset>
        <div class="form-group">
            <button type="submit" class="btn btn-outline-info">Passwort aktualisieren</button>
        </div>
    </form>
</div>
{% endblock content %}
